<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商家登录 - 雪板租赁</title>
    <link rel="stylesheet" href="../public/css/common.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="admin-login-container">
        <!-- 登录头部 -->
        <div class="admin-login-header">
            <div class="admin-login-logo">🏂</div>
            <div class="admin-login-title">商家管理</div>
            <div class="admin-login-subtitle">雪板租赁平台商家端</div>
        </div>
        
        <!-- 登录表单 -->
        <div class="admin-login-form">
            <!-- 手机号 -->
            <div class="input-group">
                <label class="input-label">手机号</label>
                <input type="tel" id="phone" class="input" placeholder="请输入手机号" maxlength="11">
            </div>
            
            <!-- 密码 -->
            <div class="input-group">
                <label class="input-label">密码</label>
                <input type="password" id="password" class="input" placeholder="请输入密码" maxlength="6">
            </div>
            
            <!-- 登录按钮 -->
            <button class="btn btn-primary btn-block btn-lg mt-16" id="loginBtn" onclick="doLogin()">
                登录
            </button>
            
            <!-- 用户入口 -->
            <div class="text-center mt-24">
                <a href="../user/index.html" style="color: #999; font-size: 13px;">用户端入口 →</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../public/js/supabase-client.js"></script>
    <script src="../public/js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 检查是否已登录
            const session = getAdminSession();
            if (session) {
                showToast('已登录', 'success');
                setTimeout(() => {
                    location.href = 'index.html';
                }, 1000);
            }
        });
        
        // 登录
        async function doLogin() {
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            
            const success = await adminLogin(phone, password);
            
            if (!success) {
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        }
    </script>
</body>
</html>
